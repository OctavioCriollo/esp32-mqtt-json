; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcu-32s]
; Espressif dropped official PlatformIO support; the community-maintained
; pioarduino platform tracks current Arduino core 3.x / ESP-IDF 5.x.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
; Portal is PROGMEM and config is NVS, so SPIFFS is unused. min_spiffs gives
; two 1.9 MB app slots (OTA kept) instead of default 1.25 MB, dropping flash
; use from ~96% to ~65%. NVS partition offset is unchanged, so saved config
; survives. If a LittleFS web dashboard is built later, revisit this (see
; docs/web-dashboard-design.md).
board_build.partitions = min_spiffs.csv
build_flags =
	-include soc/gpio_struct.h
lib_deps = 
	esp32async/AsyncTCP@^3.3.2
	esp32async/ESPAsyncWebServer@^3.6.0
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.4.0
	milesburton/DallasTemperature@^3.11.0
	adafruit/Adafruit Unified Sensor@^1.1.13
	adafruit/Adafruit BusIO@^1.14.3
	adafruit/Adafruit BME280 Library@^2.2.2
	; contrem/arduino-timer@^3.0.1   ; parked: re-enable when the tachometer is wired up
